<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIGN UP - DIV CONST</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@12/swiper-bundle.min.css"/>
</head>
<body>
    <header>
        <!-- a title or the company name -->
        <h1 class="company-name">DIV CONST</h1>

        <!-- Embodied in <nav> tag inside the <header> -->
        <nav class="nav-bar">
            <ul>
                <li><a id="home" class="nav-link" href="index.html">HOME</a></li>
                <li><a id="blogs" class="nav-link" href="blogs.html">BLOGS</a></li>
                <li><a id="signup" class="nav-link active" href="signup.html">SIGN UP</a></li>
                <li><a id="contact" class="nav-link" href="contact.html">CONTACT</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <!-- <section class="sign-up-lobby legend">
            <h1>SIGN UP</h1>
        </section> -->

        <section class="sign-up-board">
            <div class="sign-up-flex">

                <div class="sign-up-block info-persuasive">
                    <!-- <h2>Good to see you!</h2>
                    <p>Let's create our very first impression by SIGNING UP.</p> -->

                    <!-- swiper base
                    <div class="featuring-char swiper">
                        swiper transition
                        <div class="swiper-wrapper">
                            image + context
                            <div class="char-cover swiper-slide">
                                <img class="fixed-asp" src="./images/toolkit-responsive-blog.jpg" alt="The code lines of a piece of CSS file">
                            </div>
                        </div>

                    </div> -->
                    <img class="fixed-asp" src="./images/pexels-thisisengineering-3913025.jpg" alt="A hand raised on a digitally themed blue backdrop">

                    <a class="img-attribute" target="_blank" href="https://www.pexels.com/photo/prosthetic-arm-on-blue-background-3913025/">Photo by ThisIsEngineering</a>

                    


                </div>
                <div class="sign-up-block sign-up-form">
                    <form>
                        <h2>GET STARTED</h2>
                        <section class="form-block full-name">
                            <label for="full-name">Full Name</label>
                            <input type="text" name="full-name" id="full-name" title="Full Name" placeholder="Full Name" autocomplete="name" required>
                        </section>
                        <section class="form-block email">
                            <label for="email">Email</label>
                            <input type="text" name="email" id="email" title="Email" placeholder="user@example.com" autocomplete="name" required>
                        </section>
                        <section class="form-block password">
                            <label for="password">Password</label>
                            <input type="password" name="password" id="password" title="Password" placeholder="Password" minlength="8" maxlength="16" autocomplete="new-password" required>
                        </section>
                        <section class="form-block confirm-password">
                            <label for="confirm-password">Confirm Password</label>
                            <input type="password" name="confirm-password" title="Confirm Password" id="confirm-password" placeholder="Confirm Password" required>
                        </section>
                        <button type="submit">REGISTER</button>
                    </form>
                    
                    <span>Already have an account? <a>LOG IN</a></span>
                    <!-- <span>Form</span>
                    <span>Administrator Log In</span> -->
                </div>

            </div>


        </section>

    

    </main>
    <footer>
        name
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/swiper@12/swiper-bundle.min.js"></script>
    <script type="module" src="./quicktransition.js"></script>
    <script src="./script.js"></script>
    
</body>
</html>
